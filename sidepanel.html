<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: 'Segoe UI', sans-serif; padding: 0; background: #f0f2f5; margin: 0; }
    header { 
      position: sticky; top: 0; background: #1a73e8; color: white; 
      padding: 12px 15px; display: flex; align-items: center; 
      z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-size: 0.8em;
    }
    .header-left { flex: 1; display: flex; gap: 12px; }
    .header-right { font-weight: bold; }
    header a { color: #fff; text-decoration: underline; cursor: pointer; }
    #status-bar { padding: 8px 15px; font-size: 0.8em; color: #65676b; font-style: italic; }
    #history-container { display: flex; flex-direction: column; gap: 12px; padding: 0 12px 12px 12px; }
    .summary-card { background: white; border-radius: 8px; padding: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); border: 1px solid #dddfe2; animation: fadeIn 0.3s ease-out; }
    .summary-card:first-child { border-left: 4px solid #1a73e8; }
    
    /* 配信タイトル部分の装飾 */
    .video-source { font-weight: bold; color: #1a73e8; background: #e8f0fe; padding: 6px 10px; border-radius: 6px; margin-bottom: 12px; font-size: 0.85em; display: inline-block; border: 1px solid #c2d7ff; }
    /* [主な話題] などのラベルを赤く強調 */
    .label { color: #d93025; font-weight: bold; font-size: 1.05em; border-bottom: 1px solid #ffcfcc; }
    
    .timestamp { font-size: 0.75em; color: #70757a; display: block; margin-bottom: 8px; }
    .content { white-space: pre-wrap; font-size: 0.95em; line-height: 1.7; color: #222; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <span id="header-interval">Int: --s</span>
      <span id="header-model">Model: --</span>
      <span id="header-thinking"></span>
    </div>
    <div class="header-right"><a id="open-options">Options ⚙️</a></div>
  </header>
  <div id="status-bar">Ready...</div>
  <div id="history-container"></div>
  <script src="sidepanel.js"></script>
</body>
</html>
